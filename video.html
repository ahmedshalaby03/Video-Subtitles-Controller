<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cinema Mode Player</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Courier New', Courier, monospace;
        background-color: #0f0f0f;
        background-image: radial-gradient(circle at center, #1f1f1f 0%, #000000 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        color: #fff;
      }

      .video-container {
        background: #161616;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        max-width: 900px;
        width: 100%;
        position: relative;
      }

      .video-container::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, #ff0055, #00d4ff);
        border-radius: 8px 8px 0 0;
      }

      .video-wrapper {
        position: relative;
        width: 100%;
        border-radius: 4px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        margin-bottom: 30px;
        border-bottom: 2px solid #333;
      }

      video {
        width: 100%;
        height: auto;
        display: block;
        background: #000;
        filter: contrast(1.1);
      }

      .controls-container {
        display: flex;
        gap: 20px;
        justify-content: center;
        flex-wrap: wrap;
        padding-top: 10px;
        border-top: 1px dashed #333;
      }

      button {
        background: transparent;
        color: #aaa;
        border: 1px solid #444;
        border-radius: 4px;
        padding: 12px 25px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        text-transform: uppercase;
        letter-spacing: 2px;
        position: relative;
        overflow: hidden;
      }

      button:hover {
        border-color: #00d4ff;
        color: #00d4ff;
        box-shadow: 0 0 15px rgba(0, 212, 255, 0.2), inset 0 0 10px rgba(0, 212, 255, 0.1);
        transform: translateY(-2px);
        background: rgba(0, 212, 255, 0.05);
      }

      button:last-child:hover {
        border-color: #ff0055;
        color: #ff0055;
        box-shadow: 0 0 15px rgba(255, 0, 85, 0.2);
        background: rgba(255, 0, 85, 0.05);
      }

      button:active {
        transform: scale(0.98);
      }

    </style>
  </head>
  <body>
    <div class="video-container">
      <div class="video-wrapper">
        <video id="mainVideo" src="Baby Shark.mp4" controls>
          <track id="english" src="english.vtt" kind="subtitles" srclang="en" label="English" />
          <track id="arabic" src="arabic.vtt" kind="subtitles" srclang="ar" label="Arabic" />
        </video>
      </div>

      <div class="controls-container">
        <button onclick="ArabicSub()">Arabic Subtitle</button>
        <button onclick="EnglishSub()">English Subtitle</button>
        <button onclick="TurnOff()">Turn Off</button>
      </div>
    </div>

    <script src="video.js"></script>
  </body>
</html>
